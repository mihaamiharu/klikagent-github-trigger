services:
  klikagent-github-trigger:
    build: .
    restart: unless-stopped
    ports:
      - "4001:3001"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - NODE_ENV=production
      - GITHUB_TOKEN
      - GITHUB_WEBHOOK_SECRET
      - KLIKAGENT_URL
      - TRIGGER_URL
      - GITHUB_TEST_REPO
      - QA_ENV_URL
      - PORT
